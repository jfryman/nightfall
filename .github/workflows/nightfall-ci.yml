name: Nightfall CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  local-gates:
    name: local-gates
    runs-on: [self-hosted, macOS, ARM64]
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run local gate suite
        run: scripts/ci/run-local.sh
