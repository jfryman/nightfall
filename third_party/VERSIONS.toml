# Nightfall pinned dependencies — source of truth for versions.
#
# Policy (decisions-log 2026-05-28): pin the latest stable tag/release of each dep
# as of bootstrap, record the exact commit/hash here, and require a `DEP-UPDATE:`
# commit tag to change any pin. Fill the <pin> placeholders before launch;
# scripts/preflight.sh reports them as unfilled until you do.
#
# (Naming note: kept as VERSIONS.toml to match nightfall-plan-macos.md. If you'd
# rather use JSONC, say so and the references get updated to match.)

[toolchain]
xcode = "<pin>"          # `xcodebuild -version`
macos = "<pin>"          # `sw_vers -productVersion` on smugglebook
xcodegen = "<pin>"       # `xcodegen --version`
cmake = "<pin>"

[deps.musashi]
repo   = "https://github.com/kstenerud/Musashi"
commit = "<pin>"

[deps.nlohmann_json]
repo = "https://github.com/nlohmann/json"
tag  = "<pin>"

[deps.glsl_crt]
repo   = "https://github.com/wessles/GLSL-CRT"   # adapted to Metal Shading Language in Phase 6
commit = "<pin>"

[deps.vasm]
url     = "http://sun.hasenbraten.de/vasm/"       # 68k fixture assembler (Phase 1)
version = "<pin>"

# ABI gate: abidiff/libabigail is ELF/DWARF-oriented; the C ABI is Mach-O. Verify
# Mach-O support or substitute a symbol-dump/header-snapshot diff in Phase 2
# (decisions-log "Open"). Pin only if the chosen mechanism uses it.
[deps.libabigail]
version = "<pin>"
