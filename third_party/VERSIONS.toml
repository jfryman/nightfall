# Nightfall dependency/toolchain policy marker.
#
# The launch gate allows either materialized exact pins or this explicit default
# policy marker. Per the 2026-05-28 decision, default selection is latest stable
# as of bootstrap, with exact commits/tags recorded when dependencies are first
# vendored and `DEP-UPDATE:` required for later pin changes.

[policy]
bootstrap_date = "2026-05-28"
selection_rule = "latest stable as of bootstrap; record exact hashes when vendored"
change_control = "DEP-UPDATE:"
bootstrap_policy_accepted = true
exact_pins_materialized = false

[toolchain]
xcode = "Xcode 26.3 (Build version 17C529)"
macos = "26.5"
xcodegen = "2.45.4"
cmake = "4.3.0"

[dependencies.musashi]
repo = "https://github.com/kstenerud/Musashi"
kind = "git"

[dependencies.nlohmann_json]
repo = "https://github.com/nlohmann/json"
kind = "release"

[dependencies.glsl_crt]
repo = "https://github.com/wessles/GLSL-CRT"
kind = "git"

[tools.vasm]
command = "vasmm68k_mot"
version = "vasm 1.8e; M68k/CPU32/ColdFire cpu backend 2.3c"

[tools.libabigail]
decision = "open: Mach-O support unresolved; use symbol/header snapshot fallback unless adjudicated"
